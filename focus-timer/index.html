<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Focus Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="calendar-box">
  <h3>記録</h3>
  <div id="calendar"></div>
</div>
<div class="overlay">

  <h1>Focus Timer</h1>

  <div class="circle">
    <svg width="220" height="220">
      <circle cx="110" cy="110" r="100" class="bg"></circle>
      <circle cx="110" cy="110" r="100" class="progress" id="progressCircle"></circle>
    </svg>

    <div id="timer">25:00</div>
  </div>

  <div class="buttons">
    <button id="startBtn">スタート</button>
    <button id="stopBtn">停止</button>
  </div>

  <h2 id="studyTime">今日の勉強時間: 0分</h2>

  <div class="task-area">
    <input type="text" id="taskInput" placeholder="タスク入力">
    <button id="addTaskBtn">追加</button>

    <ul id="taskList"></ul>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
